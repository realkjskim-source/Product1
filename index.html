<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Lotto Generator</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="lotto-container">
    <h1>Lotto Generator</h1>
    <div id="lottoNumbers" class="numbers">
      <!-- Numbers will appear here -->
    </div>
    <div class="controls">
      <button onclick="generateLottoNumbers()">Generate Numbers</button>
      <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()">🌙 Dark Mode</button>
    </div>
  </div>

  <div class="form-container">
    <h2>Partnership Inquiry</h2>
    <form action="https://formspree.io/f/xlgvkvbp" method="POST">
      <div class="form-group">
        <label for="email">Your Email</label>
        <input type="email" id="email" name="email" placeholder="email@example.com" required>
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4" placeholder="How can we work together?" required></textarea>
      </div>
      <button type="submit" class="submit-btn">Send Inquiry</button>
    </form>
  </div>

  <script src="/main.js"></script>
</body>
</html>
